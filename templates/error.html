{% extends "base.html" %}

{% block title %}Error {{ error_code }} - {{ app_name }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="text-center">
        <h1 class="text-9xl font-bold text-purple-600">{{ error_code }}</h1>
        <p class="text-2xl font-semibold text-gray-900 mt-4">{{ error_message }}</p>
        <p class="text-gray-600 mt-2">Oops! Something went wrong.</p>
        <div class="mt-8">
            <a href="{{ url_for('portfolio.dashboard') }}" 
               class="inline-block bg-purple-600 text-white px-6 py-3 rounded-lg hover:bg-purple-700 transition">
                Go to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
